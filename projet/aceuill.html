<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accueil - Fitness Gym</title>
    <style>
      :root {
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --gold-pale: rgba(201, 168, 76, 0.11);
        --gold-border: rgba(201, 168, 76, 0.28);
        --cyan: #8fe9f0;
        --cyan-dim: rgba(143, 233, 240, 0.13);
        --cyan-border: rgba(143, 233, 240, 0.22);
        --bg: #080d10;
        --card-bg: rgba(255, 255, 255, 0.04);
        --card-border: rgba(255, 255, 255, 0.08);
        --text: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.6);
        --text-dim: rgba(255, 255, 255, 0.3);
        --green: #4ade80;
        --red: #ef4444;
        --blue: #60a5fa;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 50px;
        height: 66px;
        background: rgba(0, 0, 0, 0.82);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--gold-border);
      }

      .logo-luxury {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-right: 22px;
        cursor: pointer;
        transition: 0.3s;
      }
      .logo-luxury:hover {
        transform: scale(1.02);
      }
      .logo-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          rgba(143, 233, 240, 0.14),
          rgba(143, 233, 240, 0.04)
        );
        border: 1px solid rgba(143, 233, 240, 0.32);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
      }
      .logo-luxury:hover .logo-icon {
        border-color: var(--cyan);
        box-shadow: 0 0 14px rgba(143, 233, 240, 0.25);
      }
      .logo-text {
        font-family: "Playfair Display", serif;
        font-size: 19px;
        font-weight: 700;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #fff 40%, var(--cyan));

        background-clip: text;
        color: transparent;
        white-space: nowrap;
      }

      .links {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .links a {
        color: rgba(255, 255, 255, 0.85);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        transition: 0.22s;
        font-family: "DM Sans", sans-serif;
      }
      .links a:hover,
      .links a.active {
        color: var(--cyan);
        background: var(--cyan-dim);
      }

      .auth-btns {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .auth-btns a {
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        padding: 7px 20px;
        border-radius: 16px;
        transition: 0.25s;
        font-family: "DM Sans", sans-serif;
      }
      .btn-connecter {
        background: transparent !important;
        color: var(--gold) !important;
        border: 1.5px solid var(--gold) !important;
      }
      .btn-connecter:hover {
        background: var(--gold) !important;
        color: #0a2a2d !important;
        transform: translateY(-2px);
      }
      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        min-height: 100vh;
        padding: 100px 30px 60px;
        background: linear-gradient(
            135deg,
            rgba(0, 0, 0, 0.6) 0%,
            rgba(0, 0, 0, 0.4) 100%
          ),
          url("background.jfif") center/cover fixed no-repeat;
        position: relative;
      }
      .hero::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
          circle at 30% 50%,
          rgba(143, 233, 240, 0.08) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .hero h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(2.5rem, 8vw, 5rem);
        letter-spacing: 8px;
        color: white;
        text-shadow: 0 0 30px rgba(143, 233, 240, 0.3);
        margin-bottom: 20px;
        animation: fadeInUp 0.8s ease-out;
      }
      .hero h2 {
        font-size: clamp(0.9rem, 3vw, 1.2rem);
        font-weight: 400;
        color: rgba(255, 255, 255, 0.85);
        max-width: 700px;
        line-height: 1.6;
        letter-spacing: 0.5px;
        animation: fadeInUp 0.8s ease-out 0.2s backwards;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      footer {
        background: linear-gradient(180deg, #0a1a1f 0%, #040a0d 100%);
        border-top: 1px solid var(--gold-border);
        text-align: center;
        padding: 24px;
        color: var(--text-dim);
        font-size: 12px;
      }
      footer .c {
        color: var(--gold);
      }
      @media (max-width: 800px) {
        header {
          padding: 0 18px;
        }
        .links a {
          padding: 5px 10px;
          font-size: 13px;
        }
        .auth-btns a {
          padding: 6px 16px;
          font-size: 12px;
        }
        .logo-icon {
          width: 32px;
          height: 32px;
        }
        .logo-icon svg {
          width: 24px;
          height: 24px;
        }
        .logo-text {
          font-size: 18px;
          letter-spacing: 2px;
        }
        .logo-luxury {
          gap: 8px;
          margin-right: 15px;
        }
        .hero {
          padding: 80px 20px 40px;
        }
        .hero h1 {
          letter-spacing: 5px;
        }
      }

      @media (max-width: 600px) {
        .logo-icon {
          width: 28px;
          height: 28px;
        }
        .logo-icon svg {
          width: 20px;
          height: 20px;
        }
        .logo-text {
          font-size: 14px;
          letter-spacing: 1.5px;
        }
        .logo-luxury {
          gap: 6px;
          margin-right: 10px;
        }
        .links a {
          padding: 4px 8px;
          font-size: 11px;
        }
        .auth-btns a {
          padding: 5px 12px;
          font-size: 11px;
        }
        .hero h1 {
          letter-spacing: 3px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="links">
        <div class="logo-luxury" onclick="window.location.href='aceuill.html'">
          <div class="logo-icon">
            <svg

              <path d="M16 16V30" stroke="#8fe9f0" stroke-width="1.5" />
              <circle
                cx="16"

                r="3"
                fill="#8fe9f0"

              />
              <path

                stroke="#8fe9f0"

              />
              <path
                d="M9 19.5L23 19.5"
                stroke="#8fe9f0"
                stroke-width="1"
                stroke-linecap="round"
              />
            </svg>
          </div>
          <span class="logo-text">FITNESS GYM</span>
        </div>
        <a href="aceuill.html">Accueil</a>
        <a href="clubs.html">Clubs</a>
        <a href="horaires.html">Horaires</a>
        <a href="offre.html">Offre</a>
        <a href="contact.html">Contact</a>
        <a href="profil.html">My FG</a>
        <a href="analytic.html">Suivi</a>
      </nav>
      <nav class="auth-btns">
        <a href="connexion.html" class="btn-connecter">Se connecter</a>
      </nav>
    </header>

    <div class="hero">
      <h1>BIENVENUE À FITNESS GYM</h1>
      <h2>
        Enjoy the difference with Fitness Gym, l'enseigne de club de fitness de
        plus de 20 ans d'expérience en Tunisie.
      </h2>
    </div>

    <footer>
      © 2026 <span class="c">Fitness Gym</span> — Tous droits réservés
    </footer>
  </body>
</html>
