<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Détail Club - Fitness Gym</title>
    <style>
      :root {
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --gold-pale: rgba(201, 168, 76, 0.11);
        --gold-border: rgba(201, 168, 76, 0.28);
        --cyan: #8fe9f0;
        --cyan-dim: rgba(143, 233, 240, 0.13);
        --cyan-border: rgba(143, 233, 240, 0.22);
        --bg: #080d10;
        --card-bg: rgba(255, 255, 255, 0.04);
        --card-border: rgba(255, 255, 255, 0.08);
        --text: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.6);
        --text-dim: rgba(255, 255, 255, 0.3);
        --green: #4ade80;
        --red: #ef4444;
        --blue: #60a5fa;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: #0a0f14;
        color: white;
        min-height: 100vh;
      }
      header.bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 50px;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(143, 233, 240, 0.12);
        z-index: 1000;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .nav-links a {
        color: rgba(255, 255, 255, 0.85);
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        padding: 7px 16px;
        border-radius: 40px;
        background: rgba(255, 255, 255, 0.08);
        transition: 0.3s;
      }

      .nav-links a:hover {
        color: #8fe9f0;
        background: rgba(143, 233, 240, 0.12);
      }

      .auth-btns {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .auth-btns a {
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        padding: 8px 22px;
        border-radius: 50px;
        transition: 0.3s;
      }

      .btn-login {
        background: transparent;
        color: #8fe9f0;
        border: 2px solid #8fe9f0;
      }

      .btn-login:hover {
        background: #8fe9f0;
        color: #0a2a2d;
      }

      .btn-signup {
        background: #8fe9f0;
        color: #0a2a2d;
        border: 2px solid #8fe9f0;
      }

      .btn-signup:hover {
        background: transparent;
        color: #8fe9f0;
      }
      .logo-luxury {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-right: 25px;
        transition: 0.3s ease;
        cursor: pointer;
      }

      .logo-luxury:hover {
        transform: scale(1.02);
      }

      .logo-icon {
        width: 38px;
        height: 38px;
        background: linear-gradient(
          135deg,
          rgba(143, 233, 240, 0.15),
          rgba(143, 233, 240, 0.05)
        );
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(143, 233, 240, 0.3);
        transition: 0.3s;
      }

      .logo-luxury:hover .logo-icon {
        border-color: #8fe9f0;
        background: linear-gradient(
          135deg,
          rgba(143, 233, 240, 0.2),
          rgba(143, 233, 240, 0.08)
        );
        box-shadow: 0 0 12px rgba(143, 233, 240, 0.2);
      }

      .logo-luxury:hover .logo-icon svg {
        transform: rotate(3deg);
      }

      .logo-text {
        font-family: "Playfair Display", serif;
        font-size: 22px;
        letter-spacing: 3px;
        background: linear-gradient(135deg, #ffffff, #8fe9f0);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        white-space: nowrap;
      }
      .hero-banner {
        margin-top: 62px;
        height: 340px;
        background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)),
          url("img22.jpg") center/cover no-repeat;
        display: flex;
        align-items: flex-end;
        padding: 40px 60px;
      }

      .hero-banner .breadcrumb {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 8px;
      }

      .hero-banner .breadcrumb span {
        color: #8fe9f0;
      }

      .hero-banner h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(3rem, 6vw, 5rem);
        letter-spacing: 6px;
        color: white;
        text-shadow: 0 0 40px rgba(143, 233, 240, 0.3);
        line-height: 1;
      }

      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: #8fe9f0;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 24px;
        border-radius: 50px;
        border: 2px solid rgba(143, 233, 240, 0.3);
        margin: 32px 60px 0;
        transition: 0.3s;
      }

      .btn-back:hover {
        background: rgba(143, 233, 240, 0.1);
      }
      .main-content {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 40px 60px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
      }

      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(143, 233, 240, 0.15);
        border-left: 3px solid rgba(143, 233, 240, 0.4);
        border-radius: 20px;
        padding: 32px 36px;
        transition: 0.3s;
      }

      .card:hover {
        border-color: rgba(143, 233, 240, 0.3);
        border-left-color: #8fe9f0;
        transform: translateY(-3px);
      }

      .card.full {
        grid-column: 1 / -1;
      }

      .card-title {
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        color: #8fe9f0;
        letter-spacing: 3px;
        margin-bottom: 22px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .info-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .info-item .icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: rgba(143, 233, 240, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: #8fe9f0;
      }

      .info-item .label {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .info-item .value {
        font-size: 15px;
        font-weight: 500;
        margin-top: 2px;
      }
      .horaires-table {
        width: 100%;
        border-collapse: collapse;
      }

      .horaires-table tr {
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .horaires-table tr:last-child {
        border: none;
      }

      .horaires-table td {
        padding: 10px 0;
        font-size: 14px;
      }

      .horaires-table td:first-child {
        color: rgba(255, 255, 255, 0.5);
        width: 140px;
      }

      .badge-ouvert {
        display: inline-block;
        background: rgba(100, 220, 130, 0.15);
        border: 1px solid rgba(100, 220, 130, 0.35);
        color: #6ddc82;
        font-size: 11px;
        font-weight: 600;
        padding: 2px 10px;
        border-radius: 20px;
        margin-left: 10px;
      }
      .activites-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .activite-tag {
        background: rgba(143, 233, 240, 0.08);
        border: 1px solid rgba(143, 233, 240, 0.2);
        color: #8fe9f0;
        font-size: 13px;
        font-weight: 500;
        padding: 7px 16px;
        border-radius: 50px;
        transition: 0.3s;
      }

      .activite-tag:hover {
        background: rgba(143, 233, 240, 0.18);
      }
      .coachs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 16px;
      }

      .coach-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(143, 233, 240, 0.1);
        border-radius: 14px;
        padding: 20px 16px;
        text-align: center;
        transition: 0.3s;
      }

      .coach-card:hover {
        border-color: rgba(143, 233, 240, 0.35);
        transform: translateY(-3px);
      }

      .coach-avatar {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: linear-gradient(135deg, #8fe9f0, #3ab8c2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        color: #0a2a2d;
        margin: 0 auto 10px;
      }

      .coach-name {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .coach-sport {
        font-size: 12px;
        color: #8fe9f0;
      }
      .adresse-content {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .adresse-line {
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .adresse-line svg {
        color: #8fe9f0;
        margin-top: 2px;
        flex-shrink: 0;
      }

      .adresse-line span {
        font-size: 15px;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.85);
      }

      .map-wrapper {
        margin-top: 16px;
        border-radius: 14px;
        overflow: hidden;
        border: 2px solid rgba(143, 233, 240, 0.2);
        box-shadow: 0 0 24px rgba(143, 233, 240, 0.08);
      }

      .map-header {
        background: rgba(143, 233, 240, 0.08);
        border-bottom: 1px solid rgba(143, 233, 240, 0.15);
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 600;
        color: #8fe9f0;
        letter-spacing: 1px;
      }

      .map-wrapper iframe {
        width: 100%;
        height: 200px;
        display: block;
        border: none;
        filter: invert(90%) hue-rotate(180deg);
      }
      footer {
        background: rgba(0, 0, 0, 0.6);
        border-top: 1px solid rgba(143, 233, 240, 0.1);
        padding: 24px 50px;
        text-align: center;
        color: white;
        font-size: 12px;
      }

      footer .fitness {
        color: var(--gold);
      }
      @media (max-width: 768px) {
        .main-content {
          grid-template-columns: 1fr;
          padding: 24px 16px;
        }
        .card.full {
          grid-column: auto;
        }
        .info-grid {
          grid-template-columns: 1fr;
        }
        header.bar {
          padding: 12px 16px;
        }
        .hero-banner {
          padding: 24px 20px;
        }
        .btn-back {
          margin: 20px 20px 0;
        }
        .logo-icon {
          width: 32px;
          height: 32px;
        }
        .logo-icon svg {
          width: 24px;
          height: 24px;
        }
        .logo-text {
          font-size: 18px;
          letter-spacing: 2px;
        }
        .logo-luxury {
          gap: 8px;
          margin-right: 15px;
        }
      }

      @media (max-width: 600px) {
        .logo-icon {
          width: 28px;
          height: 28px;
        }
        .logo-icon svg {
          width: 20px;
          height: 20px;
        }
        .logo-text {
          font-size: 14px;
          letter-spacing: 1.5px;
        }
        .logo-luxury {
          gap: 6px;
          margin-right: 10px;
        }
      }
    </style>
  </head>
