<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>formulaire</title>
  </head>
  <body>
    <h1>Mon Premier Formulaire HTML5</h1>
    <form>
      <fieldset>
        <legend>Vos coordonnées</legend>
        <table>
          <tr>
            <td>Nom*:</td>
            <td><input type="text" name="" placeholder="votre nom" /></td>
          </tr>
          <tr>
            <td>Prenom*:</td>
            <td><input type="text" name="" placeholder="votre prenom " /></td>
          </tr>
          <tr>
            <td>Date De Naissance:</td>
            <td><input type="datetime-local" name="" /></td>
          </tr>
          <tr>
            <td>Mail:</td>
            <td><input type="text" name="" placeholder="votre mail" /></td>
          </tr>
          <tr>
            <td>votre site:</td>
            <td><input type="url" name="" /></td>
          </tr>
          <tr>
            <td>code:</td>
            <td><input type="text" name="" /></td>
          </tr>
          <tr>
            <td>
              <input type="radio" name="sexe" />Homme<br />
              <input type="radio" name="sexe" />Femme<br />
            </td>
          </tr>
        </table>
      </fieldset>
      <fieldset>
        <legend>Vos gouts</legend>
        <table>
          <tr>
            <td>
              <input type="checkbox" name="" />Pommes<br />
              <input type="checkbox" name="" />Poires<br />
              <input type="checkbox" name="" />Scoubidous<br />
            </td>
          </tr>
        </table>
      </fieldset>
      <fieldset>
        <legend>Envoyer nous votre photo</legend>
        <table>
          <tr>
            <td><input type="file" name="" /></td>
          </tr>
          <tr align="left">
            <td>
              <input type="reset" value="effacer" />
              <input type="submit" value="envoyer" />
            </td>
          </tr>
        </table>
      </fieldset>
    </form>
  </body>
</html>
