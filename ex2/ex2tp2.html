<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="ex2tp3.css" />
    <title>homepage</title>
  </head>
  <body>
    <h2>lecture d'une audio</h2>
    <audio controls class="audio">
      <source src="audio.mp3" type="audio/mp3" />
    </audio>
    <h2>lecture d'une vidéo:</h2>
    <video controls width="500" height="300" class="vedio1">
      <source src="video.mp4" type="video/mp4" />
    </video>
    <h2>video a consulter en ligne depuis youtube:</h2>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/3xFpxtnxSrM?si=J-yjlPcPWuQnu1-T"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
      class="vedio2"
    ></iframe>
  </body>
</html>
